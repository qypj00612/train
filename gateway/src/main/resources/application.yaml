server:
  port: 8000
spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "http://localhost:8080"  # 关键：替换为你的前端地址（开发环境通常是 8080 端口）
            allowed-methods: [GET, POST, PUT, DELETE, OPTIONS]
            allowed-headers: "*"
            allow-credentials: true  # 允许携带 Cookie/Token（现在和 allowed-origins 不冲突了）
            max-age: 3600